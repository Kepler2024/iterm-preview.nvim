name: Bug report
description: Report a problem with iterm-preview.nvim
labels: [bug]
body:
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: e.g. 14.4
    validations:
      required: true
  - type: input
    id: iterm
    attributes:
      label: iTerm2 version
      placeholder: e.g. 3.5.0
    validations:
      required: true
  - type: input
    id: nvim
    attributes:
      label: Neovim version (`nvim --version` first line)
      placeholder: e.g. NVIM v0.10.0
    validations:
      required: true
  - type: input
    id: mkdp
    attributes:
      label: markdown-preview.nvim commit/tag
      placeholder: e.g. master @ a1b2c3d
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open foo.md
        2. :MarkdownPreview
        3. Expected ..., actual ...
    validations:
      required: true
  - type: textarea
    id: health
    attributes:
      label: Output of `:checkhealth iterm-preview`
      render: text
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Anything else
